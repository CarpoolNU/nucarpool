name: Auto Comment on Schema Changes
on:
  pull_request:
    paths:
      - "prisma/schema.prisma"

permissions:
  pull-requests: write
  contents: read

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '👋 @${{ github.actor }}\n\nLooks like your PR might contain changes to the schema.prisma file. Please open a deploy request on PlanetScale before merging.'
            })
